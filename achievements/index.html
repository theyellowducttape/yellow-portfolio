<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achievements, Rayaan Sheik</title>
<meta name="description" content="Recognition and awards for Rayaan Sheik's animation and design work.">
<meta name="author" content="Rayaan Sheik">
<meta property="og:title" content="Achievements, Rayaan Sheik">
<meta property="og:description" content="Recognition and awards for Rayaan Sheik's animation and design work.">
<meta property="og:type" content="website">
<link rel="icon" href="./assets/favicon.png" type="image/png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Montserrat for headers, Quicksand for body, both from Google Fonts. -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ===== Tokens (shared with homepage / resume) ===== */
  :root {
    --ink:    #000000;
    --paper:  #ffffff;
    --rule:   #000000;
    --accent: #FFC72C;   /* Pantone 123 C */
    --hair:   1px;

    --f-display: "Montserrat", system-ui, -apple-system, sans-serif;
    --f-body:    "Quicksand", system-ui, -apple-system, sans-serif;

    --max: 78rem;
    --gutter: clamp(1.25rem, 4vw, 3rem);
  }

  *, *::before, *::after { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--f-body);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  img { display: block; max-width: 100%; height: auto; }
  a { color: inherit; text-decoration: none; }

  ::selection { background: var(--accent); color: var(--ink); }

  .wrap {
    max-width: var(--max);
    margin-inline: auto;
    padding-inline: var(--gutter);
  }

  /* ===== Header (identical to homepage / resume) ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--paper);
    border-bottom: var(--hair) solid var(--rule);
  }
  .bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 3.5rem;
  }
  .logo {
    font-family: var(--f-display);
    font-weight: 500;
    letter-spacing: 0.02em;
    font-size: 0.95rem;
    text-transform: uppercase;
  }
  nav.links {
    display: flex;
    gap: clamp(0.75rem, 2vw, 1.75rem);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  nav.links a { padding: 0.25rem 0; border-bottom: 2px solid transparent; }
  nav.links a:hover { border-bottom-color: var(--accent); }
  nav.links a.is-current { border-bottom-color: var(--ink); }

  .nav-toggle-cb { display: none; }
  .nav-toggle {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    width: 2.25rem;
    height: 2.25rem;
    cursor: pointer;
    padding: 0.4rem;
    margin: 0;
  }
  .nav-toggle span {
    display: block;
    width: 100%;
    height: 2px;
    background: var(--ink);
    transition: transform 0.25s ease, opacity 0.2s ease;
  }

  /* ===== Intro ===== */
  .intro {
    border-bottom: var(--hair) solid var(--rule);
    padding-block: clamp(2.5rem, 6vw, 4.5rem);
  }
  .eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 600;
    margin: 0 0 1.5rem;
  }
  .intro h1 {
    font-family: var(--f-display);
    font-weight: 600;
    line-height: 0.95;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    font-size: clamp(2.25rem, 7vw, 4.5rem);
    margin: 0 0 1.5rem;
  }
  .intro h1 .dot { color: var(--accent); }
  .intro .lede {
    max-width: 52ch;
    font-size: 0.95rem;
    line-height: 1.6;
    margin: 0;
  }

  /* ===== Section head (same language as other pages) ===== */
   .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-block: 3.5rem 1.5rem;
    padding-inline: 0 1.5rem;
  }
  .section-head h2 {
    font-family: var(--f-display);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    font-size: clamp(0.9rem, 4vw, 2rem);
    line-height: 1;
    margin: 0;
  }
  .section-head .count {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    font-weight: 600;
  }

  /* =========================================================
     Achievement wall: a grid of certificate-style cards.
     Sharp corners, hairline borders, no hover-inversion (these
     aren't links to click through, they're records to read).
     ========================================================= */
  .wall {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
    border-top: var(--hair) solid var(--rule);
    border-left: var(--hair) solid var(--rule);
  }
  .card {
    border-right: var(--hair) solid var(--rule);
    border-bottom: var(--hair) solid var(--rule);
    display: flex;
    flex-direction: column;
  }
  .card-media {
    aspect-ratio: 4 / 3;
    overflow: hidden;
    filter: grayscale(1) contrast(1.05);
    transition: filter 0.25s ease;
    background: var(--paper);
  }
  .card:hover .card-media { filter: none; }
  .card-media img { width: 100%; height: 100%; object-fit: cover; }

  .card-body {
    padding: 1.5rem;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .card-eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 600;
    padding-left: 0.75rem;
    border-left: 3px solid var(--accent);
    margin: 0 0 0.85rem;
  }
  .card-title {
    font-family: var(--f-display);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    line-height: 1.15;
    font-size: 1.15rem;
    margin: 0 0 0.5rem;
  }
  .card-category {
    font-size: 0.85rem;
    margin: 0 0 0.75rem;
  }
  .card-project {
    margin-top: auto;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 0.4rem 0.7rem;
    border: var(--hair) solid var(--ink);
    align-self: flex-start;
  }

  /* Empty state, shown by the renderer if the data array is ever empty */
  .wall-empty {
    border: var(--hair) solid var(--rule);
    padding: 3rem 1.5rem;
    text-align: center;
    font-size: 0.9rem;
  }

  /* ===== Desktop grid ===== */
  @media (min-width: 640px) {
    .wall { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 960px) {
    .wall { grid-template-columns: repeat(3, 1fr); }
  }

  /* ===== Footer (identical to homepage / resume) ===== */
  footer {
    border-top: var(--hair) solid var(--rule);
    padding-block: 3rem;
    margin-top: 4rem;
  }
  .foot-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 2rem 3rem;
    justify-content: space-between;
    align-items: flex-end;
  }
  .foot-big {
    font-family: var(--f-display);
    font-weight: 600;
    text-transform: uppercase;
    font-size: clamp(1.75rem, 6vw, 3.5rem);
    line-height: 0.95;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .foot-big .dot { color: var(--accent); }
  .foot-links { display: flex; flex-wrap: wrap; gap: 0; }
  .foot-links a {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 0.6rem 1rem;
    border: var(--hair) solid var(--ink);
  }
  .foot-links a + a { border-left: 0; }
  .foot-links a:hover { background: var(--accent); color: var(--ink); }

  a:focus-visible, .btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ===== Mobile ===== */
  @media (max-width: 819px) {
    .nav-toggle { display: flex; }

    nav.links {
      position: absolute;
      top: 3.5rem;
      left: 0;
      right: 0;
      flex-direction: column;
      gap: 0;
      background: var(--paper);
      border-bottom: var(--hair) solid var(--rule);
      max-height: 0;
      overflow: hidden;
      visibility: hidden;
      transition: max-height 0.3s ease, visibility 0.3s;
    }
    nav.links a {
      padding: 1rem var(--gutter);
      border-bottom: var(--hair) solid var(--rule);
      font-size: 0.85rem;
    }
    nav.links a:last-child { border-bottom: 0; }
    nav.links a:hover {
      border-bottom-color: var(--rule);
      box-shadow: inset 4px 0 0 var(--accent);
    }
    nav.links a:last-child:hover { border-bottom-color: transparent; }

    .nav-toggle-cb:checked ~ nav.links {
      max-height: 24rem;
      visibility: visible;
    }
    .nav-toggle-cb:checked ~ .nav-toggle span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-toggle-cb:checked ~ .nav-toggle span:nth-child(2) { opacity: 0; }
    .nav-toggle-cb:checked ~ .nav-toggle span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .bar { position: relative; }

    .section-head { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    .foot-grid { align-items: flex-start; }
  }

  .nav-toggle-cb:focus-visible ~ .nav-toggle {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<header>
  <div class="wrap bar">
    <a class="logo" href="/">Rayaan Sheik</a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle-cb" aria-hidden="true">
    <label for="nav-toggle" class="nav-toggle" aria-label="Toggle navigation menu">
      <span></span><span></span><span></span>
    </label>

    <nav class="links" aria-label="Primary">
      <a href="/#projects">Projects</a>
      <a href="/achievements" class="is-current">Achievements</a>
      <a href="/resume">Resume</a>
      <a href="https://www.youtube.com/watch?v=Dk-9GllSbC4" target="_blank" rel="noopener noreferrer">Short Film</a>
    </nav>
  </div>
</header>

<main>

  <!-- INTRO -->
  <section class="intro">
    <div class="wrap">
      <p class="eyebrow">Recognition</p>
      <h1>Achievements</h1>
      <p class="lede">
        Awards and official selections for my design and animation work.
      </p>
    </div>
  </section>

  <!-- ACHIEVEMENTS -->
  <section id="achievements">
    <div class="wrap">
      <div class="section-head">
        <h2>Awards</h2>
        <span class="count" id="achievement-count">00 Entries</span>
      </div>

      <div class="wall" id="achievement-wall" aria-live="polite">
        <!-- Cards are rendered here by the script below, from the ACHIEVEMENTS array. -->
      </div>
    </div>
  </section>
</main>

<footer>
  <div class="wrap foot-grid">
    <p class="foot-big">Let's Work<br>Together</p>
    <div class="foot-links">
      <a href="https://www.linkedin.com/in/rayaansheik/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="https://www.behance.net/rayaansheik" target="_blank" rel="noopener noreferrer">Behance</a>
      <a href="https://www.instagram.com/rayaan.sheik/" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a href="mailto:rayaan.sheik.98@gmail.com">Email</a>
      <a href="tel:+919489961357">Phone</a>
    </div>
  </div>
</footer>

<script>
  /* =========================================================
     ACHIEVEMENTS DATA
     -----------------------------------------------------------
     To add a new achievement, copy one object below and fill
     in your own values. Nothing else on the page needs to
     change, the card grid above and the count both update
     automatically from this list.

     Fields:
       image     required, path to the award/certificate image
       title     required, name of the award or festival
       category  required, e.g. "Best Student Animated Film 3D"
       project   required, the project or film this award is for
       alt       optional, defaults to the title if left out
     ========================================================= */
  const ACHIEVEMENTS = [
    {
      image: "./Achievements_files/asifa-india-PwWZqIrj.jpg",
      title: "ASIFA India IAD Awards of Excellence 2025",
      category: "Best Student Animated Film 3D",
      project: "Kannagi"
    },
    {
      image: "./Achievements_files/asifa-korea-DQpNqfZc.jpg",
      title: "ASIFA Korea IAD 2024",
      category: "Official Selection",
      project: "Kannagi"
    },
    {
      image: "./Achievements_files/bengaluru-fest-CDN_96T5.jpg",
      title: "Bengaluru International Short Film Festival 2024",
      category: "Official Selection",
      project: "Kannagi"
    }

    /* Add new entries below this line, e.g:
    ,{
      image: "./Achievements_files/my-new-award.jpg",
      title: "Festival or Award Name",
      category: "Award Category",
      project: "Project Name"
    }
    */
  ];

  function renderAchievements(list) {
    const wall = document.getElementById("achievement-wall");
    const count = document.getElementById("achievement-count");

    count.textContent = String(list.length).padStart(2, "0") + (list.length === 1 ? " Entry" : " Entries");

    if (!list.length) {
      wall.innerHTML = '<p class="wall-empty">No achievements added yet.</p>';
      return;
    }

    wall.innerHTML = list.map(function (item) {
      const alt = item.alt || item.title;
      return (
        '<article class="card">' +
          '<div class="card-media"><img src="' + item.image + '" alt="' + alt + '" loading="lazy"></div>' +
          '<div class="card-body">' +
            '<p class="card-eyebrow">' + item.project + '</p>' +
            '<h3 class="card-title">' + item.title + '</h3>' +
            '<p class="card-category">' + item.category + '</p>' +
          '</div>' +
        '</article>'
      );
    }).join("");
  }

  renderAchievements(ACHIEVEMENTS);
</script>

</body>
</html>
